name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/update releases
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Release Package
        run: |
          chmod +x release.sh
          ./release.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: drs ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            build/release/drs.tar.gz
            build/release/drs.tar.gz.sha256
